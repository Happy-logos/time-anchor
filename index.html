function ss(d,o){const w=["木","火","土","金","水"];const df=(w.indexOf(WTG[o])-w.indexOf(WTG[d])+5)%5;const s=YY[d]===YY[o];return[["比肩","劫财"],["食神","伤官"],["偏财","正财"],["七杀","正官"],["偏印","正印"]][df][s?0:1]}
function jd(y,m,d,h=0,mi=0){let yr=y,mo=m;const dy=d+h/24+mi/1440;if(mo<=2){yr--;mo+=12}const A=Math.floor(yr/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(yr+4716))+Math.floor(30.6001*(mo+1))+dy+B-1524.5}

function jd2d(j){const j2=j+.5,Z=Math.floor(j2),F=j2-Z,A=Z<2299161?Z:Z+1+Math.floor((Z-1867216.25)/36524.25)-Math.floor(Math.floor((Z-1867216.25)/36524.25)/4),B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C),E=Math.floor((B-D)/30.6001),d=B-D-Math.floor(30.6001*E),m=E<14?E-1:E-13,y=m>2?C-4716:C-4715,hf=F*24;return{year:y,month:m,day:d,hour:Math.floor(hf),minute:Math.floor((hf-Math.floor(hf))*60)}}

function calc(yr,m,d,h,mi,lon,sex){

let xl=[],jl=[];
if(th>=4){xl=[{wx:ws,r:`${rm[ws]}\n泄日主旺气，把内在的能量转化为外在的成果。`},{wx:wk,r:`${rm[wk]}\n消耗多余能量，转化为实际收益。身旺之人追财不怕累。`}];jl=[{wx:sg,r:`${rm[sg]}\n生扶已够，再加反而"溺爱"，容易陷入过度准备而不行动。`},{wx:dw,r:`${rm[dw]}\n身已旺，同类太多则竞争加剧、资源分散。`}]}
else{xl=[{wx:sg,r:`${rm[sg]}\n日主需要生扶来增强根基，印星是贵人和资源来源。`},{wx:dw,r:`${rm[dw]}\n同类帮扶，增强自身力量。合伙人、朋友的支持很重要。`}];jl=[{wx:kw,r:`${rm[kw]}\n身弱遇到太多管束和压力容易被压垮，需量力而行。`},{wx:wk,r:`${rm[wk]}\n精力有限，过度追财反而伤身。先养根基再图发展。`}]}
ls.push({title:"✅ 喜用五行",content:xl.map(x=>`${WE[x.wx]} **${x.wx}** — ${x.r}`).join("\n\n"),type:"xi"});
ls.push({title:"⛔ 忌讳五行",content:jl.map(x=>`${WE[x.wx]} **${x.wx}** — ${x.r}`).join("\n\n"),type:"ji"});

if(lk.length>0){const la={"金":`🪙 **缺金**\n金代表决断、规则和工具。\n💡 搭建个人工作流、养成固定节奏、使用好的工具辅助决策。`,"木":`🌿 **缺木**\n木代表表达、创造和输出。缺木的人往往"想得多说得少"。\n💡 写作、内容创作、教学，把所知所想表达出来。每一次输出都是在"种树"。`,"水":`💧 **缺水**\n水代表智慧、灵活和流动。\n💡 多阅读、多接触不同领域、培养多角度思考。`,"火":`🔥 **缺火**\n火代表行动力和变现。缺火的人可能"万事俱备只缺点火"。\n💡 主动定价收费、大胆推广自己、设定deadline。`,"土":`⛰️ **缺土**\n土代表稳定、信用和扎根。\n💡 深耕一个领域、积累口碑、建立长期信任关系。`};
ls.push({title:"🔮 五行缺失与补益",content:lk.map(w=>la[w]||`缺${w}`).join("\n\n"),type:"lack"})}

const fd=`${sg}（印）→ ${dw}（日主）→ ${ws}（食伤）→ ${wk}（财）\n\n这条链路是否通畅，决定了能量能否从"输入"转化为"输出"再转化为"收益"。${wc[ws]===0?`\n\n⚠ ${ws}（食伤/输出端）力量薄弱，"输出"是需要后天主动修炼的环节。`:""}${wc[wk]===0?`\n\n⚠ ${wk}（财/变现端）力量薄弱，变现需要更主动地推动。`:""}`;
ls.push({title:"🔄 能量流向",content:fd});

const mc=CG[mz][0],ms=ss(dt,mc);
ls.push({title:"📋 格局概要",content:`月令${mz}（${WDZ[mz]}），主气${mc}（${ms}）。${cj?`当前节令：${cj.name}。`:""}\n\n格局的详细成败分析涉及藏干透出、刑冲合害、调候用神等复杂因素，以上自动分析仅供娱乐参考。`});
return ls}
